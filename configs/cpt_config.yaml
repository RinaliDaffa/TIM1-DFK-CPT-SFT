# ==============================================================================
# Tim1-DFK: Continued Pre-Training (CPT) Configuration
# ==============================================================================
# Base Model: Qwen3-8B (via Unsloth pre-quantized)
# Library: Unsloth + HuggingFace TRL
# ==============================================================================

# --- Model ---
model:
  name: "unsloth/Qwen3-8B-bnb-4bit"
  max_seq_length: 2048
  load_in_4bit: true # QLoRA 4-bit quantization
  dtype: null # Auto-detect (float16/bfloat16)

# --- LoRA Configuration ---
lora:
  r: 16 # LoRA rank
  lora_alpha: 32 # LoRA alpha (scaling factor)
  lora_dropout: 0.05
  target_modules: # Modules to apply LoRA
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  bias: "none"
  use_rslora: true # Rank-stabilized LoRA

# --- Data ---
data:
  corpus_path: "Dataset/CPT/processed/cpt_corpus.txt"
  block_size: 2048 # Text block size for CPT

# --- Training ---
training:
  output_dir: "outputs/cpt"
  num_train_epochs: 3
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8 # Effective batch = 2 * 8 = 16
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1
  weight_decay: 0.01
  max_grad_norm: 1.0
  fp16: true  # Use fp16 for T4 GPU compatibility
  bf16: false
  seed: 42

  # Saving
  save_strategy: "steps"
  save_steps: 100
  save_total_limit: 3

  # Logging
  logging_steps: 10
  report_to: "wandb" # Options: "wandb", "tensorboard", "none"

# --- W&B ---
wandb:
  project: "tim1-dfk"
  run_name: "cpt-qwen3-8b"
  tags: ["cpt", "qwen3", "dfk", "fase1"]
